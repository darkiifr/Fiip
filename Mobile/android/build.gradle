buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

// Backward-compat shim: map legacy 'provided' usages to 'compileOnly'
subprojects { subproject ->
    subproject.afterEvaluate {
        try {
            if (subproject.configurations.findByName('compileOnly') == null) {
                subproject.configurations.create('compileOnly')
            }
            def dh = subproject.dependencies
            if (!dh.metaClass.getMetaMethod("provided", Object)) {
                dh.metaClass.provided = { dep ->
                    dh.add('compileOnly', dep)
                }
            }
        } catch (ignored) {}
    }
}

apply plugin: "com.facebook.react.rootproject"
