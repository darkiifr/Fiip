version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    groups:
      frontend-production:
        dependency-type: production
        patterns:
          - "*"
      frontend-development:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
      - security
    groups:
      rust:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /Mobile
    schedule:
      interval: weekly
      day: monday
      time: "07:45"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - mobile
      - security
    groups:
      mobile-production:
        dependency-type: production
        patterns:
          - "*"
      mobile-development:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /PublicLinksite
    schedule:
      interval: weekly
      day: monday
      time: "07:50"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - public-linksite
      - security
    groups:
      public-linksite-production:
        dependency-type: production
        patterns:
          - "*"
      public-linksite-development:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
      - security
