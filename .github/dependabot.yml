version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Paris
    groups:
      frontend:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Europe/Paris
    groups:
      rust:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /Mobile
    schedule:
      interval: weekly
      day: monday
      time: "07:45"
      timezone: Europe/Paris
    groups:
      mobile:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /PublicLinksite
    schedule:
      interval: weekly
      day: monday
      time: "07:50"
      timezone: Europe/Paris
    groups:
      public-linksite:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Paris
