name: Supabase Database and Edge Functions

on:
  pull_request:
    paths:
      - supabase/**
      - .github/workflows/supabase-migrations.yml
  push:
    branches:
      - main
    paths:
      - supabase/**
      - .github/workflows/supabase-migrations.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fiip-supabase-migrations
  cancel-in-progress: false

jobs:
  migrations:
    name: Validate or deploy Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLERK_DOMAIN: clerk.fiip.fr
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      HAS_SUPABASE_SECRETS: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_DB_URL != '' && secrets.SUPABASE_PROJECT_ID != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1

      - name: Require deployment secrets outside pull requests
        if: github.event_name != 'pull_request' && env.HAS_SUPABASE_SECRETS != 'true'
        run: |
          echo "SUPABASE_ACCESS_TOKEN, SUPABASE_DB_URL and SUPABASE_PROJECT_ID are required." >&2
          exit 1

      - name: Validate migration files
        run: |
          if [ ! -d supabase/migrations ]; then
            echo "No tracked Supabase migrations directory; skipping migration validation."
            echo "HAS_SUPABASE_MIGRATIONS=false" >> "$GITHUB_ENV"
            exit 0
          fi

          migration_files="$(find supabase/migrations -maxdepth 1 -type f -name '*.sql' | sort)"
          if [ -z "$migration_files" ]; then
            echo "No tracked Supabase migration files; skipping remote migration steps."
            echo "HAS_SUPABASE_MIGRATIONS=false" >> "$GITHUB_ENV"
            exit 0
          fi

          versions="$(printf '%s\n' "$migration_files" | sed -E 's#.*/([0-9]+)_.*#\1#')"
          test "$(printf '%s\n' "$versions" | sort | uniq -d | wc -l)" -eq 0
          echo "HAS_SUPABASE_MIGRATIONS=true" >> "$GITHUB_ENV"

      - name: Dry-run migrations on pull requests
        if: github.event_name == 'pull_request' && env.HAS_SUPABASE_SECRETS == 'true' && env.HAS_SUPABASE_MIGRATIONS == 'true'
        run: supabase db push --dry-run --db-url "$SUPABASE_DB_URL"

      - name: Deploy migrations on main
        if: github.event_name != 'pull_request' && env.HAS_SUPABASE_SECRETS == 'true' && env.HAS_SUPABASE_MIGRATIONS == 'true'
        run: supabase db push --db-url "$SUPABASE_DB_URL" --yes

      - name: Deploy zero-knowledge Edge Functions
        if: github.event_name != 'pull_request' && env.HAS_SUPABASE_SECRETS == 'true'
        shell: bash
        run: |
          set -euo pipefail
          functions=(
            confirm-upload
            generate-download-url
            generate-upload-url
            get-feature-flags
            identity-bootstrap
            restore-backup
            sync-settings
          )
          for function_name in "${functions[@]}"; do
            supabase functions deploy "$function_name" --project-ref "$SUPABASE_PROJECT_ID"
          done

      - name: Skip remote Supabase deployment without secrets
        if: github.event_name == 'pull_request' && (env.HAS_SUPABASE_SECRETS != 'true' || env.HAS_SUPABASE_MIGRATIONS != 'true')
        run: |
          echo "Supabase remote migration dry-run/deploy skipped."
          echo "Configure SUPABASE_ACCESS_TOKEN, SUPABASE_DB_URL, SUPABASE_PROJECT_ID, and tracked migration files to enable it."
