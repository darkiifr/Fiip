name: Supabase Migrations

on:
  pull_request:
    paths:
      - supabase/**
      - .github/workflows/supabase-migrations.yml
  push:
    branches:
      - main
    paths:
      - supabase/**
      - .github/workflows/supabase-migrations.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrations:
    name: Validate or deploy migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Dry-run migrations on pull requests
        if: github.event_name == 'pull_request'
        run: supabase db push --dry-run --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy migrations on main
        if: github.event_name != 'pull_request'
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --yes
