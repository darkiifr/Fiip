name: Supabase Migrations

on:
  pull_request:
    paths:
      - supabase/**
      - .github/workflows/supabase-migrations.yml
  push:
    branches:
      - main
    paths:
      - supabase/**
      - .github/workflows/supabase-migrations.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fiip-supabase-migrations
  cancel-in-progress: false

jobs:
  migrations:
    name: Validate or deploy migrations
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      HAS_SUPABASE_SECRETS: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_DB_PASSWORD != '' && secrets.SUPABASE_PROJECT_ID != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Require deployment secrets outside pull requests
        if: github.event_name != 'pull_request' && env.HAS_SUPABASE_SECRETS != 'true'
        run: |
          echo "SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD and SUPABASE_PROJECT_ID are required." >&2
          exit 1

      - name: Validate migration files
        run: |
          if [ ! -d supabase/migrations ]; then
            echo "No tracked Supabase migrations directory; skipping migration validation."
            echo "HAS_SUPABASE_MIGRATIONS=false" >> "$GITHUB_ENV"
            exit 0
          fi

          migration_files="$(find supabase/migrations -maxdepth 1 -type f -name '*.sql' | sort)"
          if [ -z "$migration_files" ]; then
            echo "No tracked Supabase migration files; skipping remote migration steps."
            echo "HAS_SUPABASE_MIGRATIONS=false" >> "$GITHUB_ENV"
            exit 0
          fi

          versions="$(printf '%s\n' "$migration_files" | sed -E 's#.*/([0-9]+)_.*#\1#')"
          test "$(printf '%s\n' "$versions" | sort | uniq -d | wc -l)" -eq 0
          echo "HAS_SUPABASE_MIGRATIONS=true" >> "$GITHUB_ENV"

      - name: Link Supabase project
        if: env.HAS_SUPABASE_SECRETS == 'true' && env.HAS_SUPABASE_MIGRATIONS == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Dry-run migrations on pull requests
        if: github.event_name == 'pull_request' && env.HAS_SUPABASE_SECRETS == 'true' && env.HAS_SUPABASE_MIGRATIONS == 'true'
        run: supabase db push --dry-run --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy migrations on main
        if: github.event_name != 'pull_request' && env.HAS_SUPABASE_SECRETS == 'true' && env.HAS_SUPABASE_MIGRATIONS == 'true'
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Skip remote Supabase deployment without secrets
        if: github.event_name == 'pull_request' && (env.HAS_SUPABASE_SECRETS != 'true' || env.HAS_SUPABASE_MIGRATIONS != 'true')
        run: |
          echo "Supabase remote migration dry-run/deploy skipped."
          echo "Configure SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD, SUPABASE_PROJECT_ID, and tracked migration files to enable it."
