name: Security Audit

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend audit and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=moderate

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm run test

      - name: Build frontend
        run: npm run build
        env:
          VITE_OPENROUTER_KEY: ${{ secrets.VITE_OPENROUTER_KEY }}

  public-linksite:
    name: Public site audit and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PublicLinksite
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: PublicLinksite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit public site dependencies
        run: npm audit --audit-level=moderate

      - name: Lint public site
        run: npm run lint

      - name: Test public site
        run: npm run test

      - name: Build public site
        run: npm run build

  mobile:
    name: Mobile audit and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit mobile dependencies
        run: npm audit --audit-level=moderate

      - name: Test mobile
        run: npm test -- --runInBand
        env:
          VITE_OPENROUTER_KEY: ${{ secrets.VITE_OPENROUTER_KEY }}

  rust:
    name: Rust audit and check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check Rust project
        working-directory: src-tauri
        run: cargo check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit
