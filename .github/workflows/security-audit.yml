name: Security Audit

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          license-check: false

  frontend:
    name: Frontend audit and build
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate CAPTCHA site key
        run: |
          if [ -z "$VITE_TURNSTILE_SITE_KEY" ]; then
            echo "VITE_TURNSTILE_SITE_KEY GitHub secret is required for frontend builds." >&2
            exit 1
          fi

      - name: Audit npm dependencies
        run: npm audit --audit-level=moderate

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm run test

      - name: Build frontend
        run: npm run build

  public-linksite:
    name: Public site audit and build
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
    defaults:
      run:
        working-directory: PublicLinksite
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: PublicLinksite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate CAPTCHA site key
        run: |
          if [ -z "$VITE_TURNSTILE_SITE_KEY" ]; then
            echo "VITE_TURNSTILE_SITE_KEY GitHub secret is required for public site builds." >&2
            exit 1
          fi

      - name: Audit public site dependencies
        run: npm audit --audit-level=moderate

      - name: Lint public site
        run: npm run lint

      - name: Test public site
        run: npm run test

      - name: Build public site
        run: npm run build

  mobile:
    name: Mobile audit and tests
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    defaults:
      run:
        working-directory: Mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit mobile dependencies
        run: npm audit --audit-level=moderate

      - name: Test mobile
        run: npm test -- --runInBand

  rust:
    name: Rust audit and check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check Rust project
        working-directory: src-tauri
        run: cargo check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit
