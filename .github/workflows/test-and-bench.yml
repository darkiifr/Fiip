name: Test and Benchmark

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test

      - name: Lint
        run: npm run lint

  test-and-bench-backend:
    name: Backend Tests & Benchmarks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run Tests
        working-directory: src-tauri
        run: cargo test --verbose

      - name: Run Benchmarks
        working-directory: src-tauri
        run: cargo bench --verbose
        continue-on-error: true # benchmarks shouldn't necessarily fail the build if they haven't been configured yet
