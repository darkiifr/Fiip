<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fiip Clipper</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <img src="icons/icon48.png" alt="" />
        <div>
          <p class="kicker">Fiip Clipper</p>
          <h1>Capturer dans Fiip</h1>
        </div>
      </header>

      <section class="account" aria-labelledby="account-title">
        <p class="kicker">Fiip Cloud</p>
        <h2 id="account-title">Compte</h2>
        <form id="auth-form">
          <label for="auth-email">Adresse e-mail</label>
          <input id="auth-email" name="email" type="email" autocomplete="email" required />
          <label for="auth-password">Mot de passe</label>
          <input id="auth-password" name="password" type="password" autocomplete="current-password" required />
          <button id="sign-in" type="submit">Se connecter</button>
        </form>
        <div id="account-panel" class="account-row" hidden>
          <span id="account-email"></span>
          <button id="sign-out" class="icon-command" type="button" title="Se déconnecter" aria-label="Se déconnecter">↪</button>
        </div>
        <p id="auth-status">Chargement du compte...</p>
      </section>

      <section class="panel" aria-labelledby="capture-mode-label">
        <label id="capture-mode-label" for="capture-mode">Mode de capture</label>
        <select id="capture-mode">
          <option value="readable">Page lisible</option>
          <option value="selection">Sélection</option>
        </select>
        <p>Choisissez la page nettoyée ou uniquement le texte sélectionné.</p>
      </section>

      <button id="clip-selection" type="button">
        <span>Capturer maintenant</span>
      </button>
      <a id="open-fiip" class="primary-link" href="#" hidden>Ouvrir Fiip</a>
      <p id="status">Prêt.</p>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
